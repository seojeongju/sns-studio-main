name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: setup
    attributes:
      label: Setup
      options:
        - Docker
        - Local development (with Docker PostgreSQL)
        - Fully local (SQLite)
        - Production deployment
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15, Ubuntu 24.04, Windows 11

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 130, Firefox 132, Safari 18

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs or error messages.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, configuration details, or anything else that might help.
