# Pre-commit hooks for BrightBean Studio.
# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files
# Reference: https://pre-commit.com

default_language_version:
  python: python3.12

repos:
  # Basic hygiene: trailing whitespace, EOF newlines, large files, merge conflicts, etc.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Ruff: lint + format (replaces black, isort, flake8, pyupgrade, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # mypy: static type checking for Python
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^(apps|config|providers)/
        args: ["--ignore-missing-imports"]
        additional_dependencies:
          - django-stubs
          - types-requests

  # gitleaks: block commits that contain secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Django: run Django's own system checks
  - repo: local
    hooks:
      - id: django-check
        name: django-check
        entry: python manage.py check
        language: system
        pass_filenames: false
        files: \.(py|html)$
        stages: [pre-push]
